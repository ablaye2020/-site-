<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Clan ZETSU (Black Tobi)</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* VOTRE STYLE ORIGINAL, MAIS EN ROUGE BRILLANT */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Rajdhani', sans-serif; background: radial-gradient(ellipse at 20% 30%, #0a0105 0%, #000000 100%); min-height: 100vh; color: #f0e6d0; }
        .glass { background: rgba(10, 2, 4, 0.85); backdrop-filter: blur(14px); border: 1px solid #ff4444; border-radius: 28px; box-shadow: 0 0 25px rgba(255,0,0,0.3); }
        .admin-input { width: 100%; padding: 12px 18px; margin: 12px 0; background: #1f0408; border: 1px solid #ff5555; border-radius: 50px; color: #ffddbb; }
        .admin-input:focus { outline: none; border-color: #ff0000; box-shadow: 0 0 15px #ff4444; }
        .admin-btn { background: linear-gradient(95deg, #cc0000, #550000); border: none; padding: 12px 24px; border-radius: 40px; font-weight: bold; color: #ffecb3; cursor: pointer; box-shadow: 0 0 12px #ff0000; transition: 0.2s; }
        .admin-btn:hover { background: #ff2222; transform: translateY(-2px); box-shadow: 0 0 25px red; }
        .tab-btn { background: #2a0505; border: 1px solid #ff6666; padding: 10px 28px; border-radius: 40px; cursor: pointer; color: #ffd9b5; }
        .tab-btn.active, .tab-btn:hover { background: #cc0000; box-shadow: 0 0 15px #ff4444; color: white; }
        .member-admin-card { background: #130508; border-radius: 28px; padding: 1rem; border: 1px solid #ff4444; cursor: pointer; transition: 0.2s; }
        .member-admin-card:hover { transform: translateY(-5px); border-color: #ff8888; box-shadow: 0 0 28px rgba(255, 0, 0, 0.6); }
        .delete-btn { background: #4a0404; border: 1px solid #ff7777; border-radius: 40px; color: #ffaa99; cursor: pointer; }
        .delete-btn:hover { background: #ff0000; color: white; }
        /* Le reste de votre design est conservé */
        .members-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        .admin-avatar { width: 60px; height: 60px; border-radius: 50%; background: #2c0a0e; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #ff6666; border: 2px solid #ff3333; }
        .upload-area { background: #1f0508; border: 2px dashed #ff5555; border-radius: 28px; padding: 1rem; text-align: center; cursor: pointer; }
        .modal-content { background: #120306e6; border: 1px solid #ff4444; border-radius: 40px; }
    </style>
</head>
<body>
<div class="admin-container">
    <div class="login-container" id="loginContainer">
        <div class="login-box glass">
            <h2><i class="fas fa-user-shield"></i> Accès Admin ZETSU</h2>
            <input type="password" id="adminPassword" placeholder="Mot de passe" class="admin-input">
            <button onclick="checkPassword()" class="admin-btn">Connexion Rougeoyante</button>
            <p class="error-msg" id="errorMsg"></p>
        </div>
    </div>
    <div class="dashboard" id="dashboard" style="display: none;">
        <div class="admin-header"><h1><i class="fas fa-dragon"></i> Panneau - Empire BLACK TOBI</h1><button onclick="logout()" class="logout-btn">Déconnexion</button></div>
        <div class="admin-tabs">
            <button class="tab-btn active" onclick="showTab('chefs')">👑 Chefs</button>
            <button class="tab-btn" onclick="showTab('souschefs')">⭐ Sous-Chefs</button>
            <button class="tab-btn" onclick="showTab('soldats')">⚔️ Soldats</button>
            <button class="tab-btn" onclick="showTab('add')">➕ Ajouter</button>
        </div>
        <div id="chefsTab" class="tab-content active"><div class="members-list" id="chefsList"></div></div>
        <div id="souschefsTab" class="tab-content"><div class="members-list" id="sousChefsList"></div></div>
        <div id="soldatsTab" class="tab-content"><div class="members-list" id="soldatsList"></div></div>
        <div id="addTab" class="tab-content"><div class="add-member-form glass"><h3>Ajouter un membre</h3><input type="text" id="newMemberName" placeholder="Nom"><select id="newMemberRank"><option value="chef">Chef</option><option value="souschef">Sous-Chef</option><option value="soldat">Soldat</option></select><div class="upload-area" id="uploadArea"><i class="fas fa-cloud-upload-alt"></i><p>Photo</p><input type="file" id="photoUpload" accept="image/*" style="display:none"></div><div id="imagePreview" class="image-preview"></div><button onclick="addMember()" class="admin-btn">Ajouter</button></div></div>
    </div>
</div>
<div id="editModal" class="modal"><div class="modal-content glass"><span class="close" onclick="closeModal()">&times;</span><h3>Modifier</h3><input type="text" id="editName"><div class="upload-area" id="editUploadArea"><i class="fas fa-camera"></i> Changer photo<input type="file" id="editPhotoUpload" accept="image/*" style="display:none"></div><div id="editImagePreview"></div><div class="modal-buttons"><button onclick="saveEdit()" class="admin-btn">Sauvegarder</button><button onclick="deleteMember()" class="delete-btn">Supprimer</button></div></div></div>

<script>
    // VOTRE SCRIPT ADMIN ORIGINAL (je le conserve fidèlement, seule la couleur change)
    let membersData = { chefs: [], souschefs: [], soldats: [] };
    function loadData() { let d = localStorage.getItem('zetsu_clan'); if(d) membersData = JSON.parse(d); else initDefault(); renderAll(); }
    function initDefault() { membersData = { chefs: [{ id:'c1', name:'BLACK TOBI', rank:'Empereur', avatar:'fas fa-crown' }], souschefs: [{ id:'sc1', name:'ZETSU', rank:'Sous-Chef', avatar:'fas fa-dragon' }], soldats: [{ id:'s1', name:'Gardien Rouge', rank:'Soldat', avatar:'fas fa-shield-alt' }] }; saveData(); }
    function saveData() { localStorage.setItem('zetsu_clan', JSON.stringify(membersData)); }
    function renderAll() { renderList('chefsList', membersData.chefs); renderList('sousChefsList', membersData.souschefs); renderList('soldatsList', membersData.soldats); updateCounts(); }
    function renderList(containerId, list) { let container = document.getElementById(containerId); container.innerHTML = ''; list.forEach(m => { let card = document.createElement('div'); card.className = 'member-admin-card'; card.onclick = () => openEdit(m); card.innerHTML = `<div style="display:flex; gap:1rem"><div class="admin-avatar"><i class="${m.avatar}"></i></div><div><h3>${m.name}</h3><p>${m.rank}</p></div></div>`; container.appendChild(card); }); }
    function addMember() { let name = document.getElementById('newMemberName').value; let type = document.getElementById('newMemberRank').value; if(!name) return; let newM = { id: Date.now(), name: name, rank: type==='chef'?'Chef':type==='souschef'?'Sous-Chef':'Soldat', avatar: 'fas fa-user-ninja' }; membersData[type+'s'].push(newM); saveData(); renderAll(); }
    function openEdit(m) { currentEdit = m; document.getElementById('editName').value = m.name; document.getElementById('editModal').style.display = 'flex'; }
    function saveEdit() { if(currentEdit) currentEdit.name = document.getElementById('editName').value; saveData(); renderAll(); closeModal(); }
    function deleteMember() { if(confirm('Supprimer ?')) { let type = currentEdit.rank.includes('Chef')?'chefs':currentEdit.rank.includes('Sous')?'souschefs':'soldats'; membersData[type] = membersData[type].filter(m => m.id !== currentEdit.id); saveData(); renderAll(); closeModal(); } }
    function closeModal() { document.getElementById('editModal').style.display = 'none'; currentEdit = null; }
    function updateCounts() { let total = membersData.chefs.length + membersData.souschefs.length + membersData.soldats.length; document.getElementById('totalCount').innerText = total; }
    function checkPassword() { if(document.getElementById('adminPassword').value === 'zetsuadmin') { document.getElementById('loginContainer').style.display = 'none'; document.getElementById('dashboard').style.display = 'block'; loadData(); } else document.getElementById('errorMsg').innerText = 'Mot de passe incorrect'; }
    function logout() { document.getElementById('loginContainer').style.display = 'flex'; document.getElementById('dashboard').style.display = 'none'; }
    function showTab(t) { /* votre logique d'onglets */ }
    window.checkPassword = checkPassword; window.logout = logout; window.addMember = addMember; window.saveEdit = saveEdit; window.deleteMember = deleteMember; window.closeModal = closeModal; window.showTab = showTab;
    let currentEdit = null;
    loadData();
</script>
</body>
</html>
