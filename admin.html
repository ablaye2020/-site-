<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin Panel - Clan ZETSU | Empire Rouge</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: radial-gradient(ellipse at 20% 30%, #0a0105 0%, #000000 100%);
            min-height: 100vh;
            color: #f0e6d0;
            overflow-x: hidden;
        }

        /* fond animé rouge */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(45deg, rgba(180, 20, 20, 0.05) 0px, rgba(180, 20, 20, 0.05) 2px, transparent 2px, transparent 10px);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 20%, rgba(220, 40, 40, 0.12), transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: redPulse 6s infinite alternate;
        }

        @keyframes redPulse {
            0% { opacity: 0.4; }
            100% { opacity: 0.9; }
        }

        .admin-container {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem;
        }

        /* verre rouge somptueux */
        .glass {
            background: rgba(10, 2, 4, 0.75);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(220, 60, 60, 0.6);
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 20px rgba(200, 30, 30, 0.3);
        }

        /* Login */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-box {
            width: 380px;
            padding: 2.5rem;
            text-align: center;
            animation: fadeGlow 0.8s ease;
        }

        .login-box h2 {
            font-family: 'Orbitron', monospace;
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #ff8866, #ff3333);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(255,0,0,0.3);
        }

        .admin-input {
            width: 100%;
            padding: 12px 18px;
            margin: 12px 0;
            background: rgba(20, 3, 5, 0.8);
            border: 1px solid #b33;
            border-radius: 50px;
            color: #ffddbb;
            font-size: 1rem;
            transition: 0.3s;
            font-weight: 500;
        }

        .admin-input:focus {
            outline: none;
            border-color: #ff5555;
            box-shadow: 0 0 15px #ff4444;
            background: #1f0408;
        }

        .admin-btn {
            background: linear-gradient(95deg, #a11, #6a0000);
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: bold;
            color: #ffecb3;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            margin-top: 10px;
            border: 1px solid #e55;
            box-shadow: 0 0 10px rgba(255,60,60,0.4);
        }

        .admin-btn:hover {
            background: #c22;
            transform: translateY(-2px);
            box-shadow: 0 0 20px red;
        }

        .error-msg {
            color: #ff7777;
            margin-top: 12px;
            font-size: 0.85rem;
        }

        /* Dashboard */
        .dashboard {
            animation: fadeInUp 0.5s;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            padding: 1rem 1.5rem;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            border: 1px solid #b33;
        }

        .admin-header h1 {
            font-size: 1.6rem;
            font-family: 'Orbitron', monospace;
            background: linear-gradient(135deg, #ffaa77, #ff4444);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logout-btn {
            background: #2a0505;
            border: 1px solid #b44;
            padding: 8px 20px;
            border-radius: 40px;
            color: #ffaa99;
            cursor: pointer;
            transition: 0.2s;
        }

        .logout-btn:hover {
            background: #a22;
            color: white;
            box-shadow: 0 0 12px red;
        }

        /* Tabs */
        .admin-tabs {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            justify-content: center;
        }

        .tab-btn {
            background: rgba(30, 5, 8, 0.8);
            border: 1px solid #b44;
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            color: #ffd9b5;
            transition: 0.2s;
            font-size: 1rem;
        }

        .tab-btn.active, .tab-btn:hover {
            background: #b11;
            border-color: #ffaa77;
            box-shadow: 0 0 12px #ff4444;
            color: white;
        }

        .tab-content {
            display: none;
            animation: fadeGlow 0.3s;
        }

        .tab-content.active {
            display: block;
        }

        /* membres list style admin - cartes rouges élégantes */
        .members-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.8rem;
            margin-top: 1rem;
        }

        .member-admin-card {
            background: linear-gradient(145deg, #130508, #080103);
            border-radius: 28px;
            padding: 1.2rem;
            border: 1px solid rgba(200, 50, 50, 0.5);
            transition: all 0.25s ease;
            cursor: pointer;
            backdrop-filter: blur(4px);
            position: relative;
            overflow: hidden;
        }

        .member-admin-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #ff4444, #ffaa66);
        }

        .member-admin-card:hover {
            transform: translateY(-5px);
            border-color: #ff6666;
            box-shadow: 0 0 28px rgba(255, 40, 40, 0.5);
            background: #1c060b;
        }

        .admin-card-content {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .admin-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #2c0a0e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.3rem;
            color: #ff6666;
            border: 2px solid #c44;
            box-shadow: 0 0 10px #b00;
        }

        .admin-info {
            flex: 1;
        }

        .admin-info h3 {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .admin-info p {
            color: #ffaa88;
            font-size: 0.8rem;
            background: rgba(150,20,20,0.3);
            display: inline-block;
            padding: 2px 12px;
            border-radius: 20px;
        }

        .edit-badge {
            font-size: 1.4rem;
            color: #ffaa66;
            opacity: 0.8;
        }

        /* Formulaire ajout */
        .add-member-form {
            max-width: 550px;
            margin: 0 auto;
            padding: 2rem;
            border-radius: 40px;
        }

        .upload-area {
            background: rgba(40, 5, 8, 0.8);
            border: 2px dashed #b44;
            border-radius: 28px;
            padding: 1.8rem;
            text-align: center;
            margin: 1rem 0;
            cursor: pointer;
            transition: 0.2s;
        }

        .upload-area:hover {
            border-color: #ff6666;
            background: #200508;
        }

        .image-preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 10px auto;
            background-size: cover;
            background-position: center;
            border: 2px solid #d44;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            width: 90%;
            max-width: 450px;
            padding: 2rem;
            position: relative;
            border-radius: 40px;
            background: #120306e6;
            border: 1px solid #e55;
        }

        .close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #ffaa77;
        }

        .delete-btn {
            background: #4a0404;
            border: 1px solid #ff7777;
            padding: 10px 20px;
            border-radius: 40px;
            color: #ffaa99;
            cursor: pointer;
            margin-left: 10px;
        }

        .delete-btn:hover {
            background: #a11;
            color: white;
        }

        .modal-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 1rem;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px);}
            to { opacity: 1; transform: translateY(0);}
        }
        @keyframes fadeGlow {
            from { opacity: 0; filter: blur(5px);}
            to { opacity: 1; filter: blur(0);}
        }
        @media (max-width: 700px) {
            .admin-header h1 { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="admin-container">
    <!-- Login Section -->
    <div class="login-container" id="loginContainer">
        <div class="login-box glass">
            <h2><i class="fas fa-user-shield"></i> ACCÈS ADMIN</h2>
            <input type="password" id="adminPassword" placeholder="Mot de passe" class="admin-input">
            <button onclick="checkPassword()" class="admin-btn">Connexion</button>
            <p class="error-msg" id="errorMsg"></p>
            <div style="margin-top: 15px; font-size: 0.7rem; color:#aa8866;">code: zetsuadmin</div>
        </div>
    </div>

    <!-- Dashboard Admin -->
    <div class="dashboard" id="dashboard" style="display: none;">
        <div class="admin-header">
            <h1><i class="fas fa-dragon"></i> PANEL ZETSU - EMPIRE ROUGE</h1>
            <button onclick="logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
        </div>

        <div class="admin-tabs">
            <button class="tab-btn active" onclick="showTab('chefs')">👑 Chefs Suprêmes</button>
            <button class="tab-btn" onclick="showTab('souschefs')">⭐ Garde d'Élite</button>
            <button class="tab-btn" onclick="showTab('soldats')">⚔️ Légion Sacrée</button>
            <button class="tab-btn" onclick="showTab('add')">➕ Ajouter Membre</button>
        </div>

        <div id="chefsTab" class="tab-content active">
            <div class="members-list" id="chefsList"></div>
        </div>
        <div id="souschefsTab" class="tab-content">
            <div class="members-list" id="sousChefsList"></div>
        </div>
        <div id="soldatsTab" class="tab-content">
            <div class="members-list" id="soldatsList"></div>
        </div>

        <div id="addTab" class="tab-content">
            <div class="add-member-form glass">
                <h3 style="text-align:center; margin-bottom:20px;"><i class="fas fa-user-plus"></i> Enrôler un Guerrier</h3>
                <input type="text" id="newMemberName" placeholder="Nom du membre" class="admin-input">
                <select id="newMemberRank" class="admin-input">
                    <option value="chef">Chef Suprême</option>
                    <option value="souschef">Sous-Chef</option>
                    <option value="soldat">Soldat d'élite</option>
                </select>
                <div class="upload-area" id="uploadArea">
                    <i class="fas fa-cloud-upload-alt" style="font-size: 2rem;"></i>
                    <p>Photo / Icône (cliquez)</p>
                    <input type="file" id="photoUpload" accept="image/*" style="display: none;">
                </div>
                <div id="imagePreview" class="image-preview" style="background-image: url(''); background-size: cover;"></div>
                <input type="hidden" id="newMemberAvatar" value="">
                <button onclick="addMember()" class="admin-btn"><i class="fas fa-save"></i> Ajouter au Clan</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal edit -->
<div id="editModal" class="modal">
    <div class="modal-content glass">
        <span class="close" onclick="closeModal()">&times;</span>
        <h3>✎ Modifier le Guerrier</h3>
        <input type="text" id="editName" placeholder="Nom" class="admin-input">
        <div class="upload-area small-upload" id="editUploadArea" style="padding:1rem;">
            <i class="fas fa-camera"></i> Nouvelle image
            <input type="file" id="editPhotoUpload" accept="image/*" style="display: none;">
        </div>
        <div id="editImagePreview" class="image-preview" style="background-size: cover;"></div>
        <input type="hidden" id="editAvatar" value="">
        <div class="modal-buttons">
            <button onclick="saveEdit()" class="admin-btn">Sauvegarder</button>
            <button onclick="deleteMember()" class="delete-btn"><i class="fas fa-trash-alt"></i> Supprimer</button>
        </div>
    </div>
</div>

<script>
    // ---------- DONNÉES PAR DÉFAUT AVEC IMAGES/FONT AWESOME ET LIKES (harmonie rouge) ----------
    let membersData = {
        chefs: [
            { id: "c1", name: "BLACK TOBI", rank: "EMPEREUR ABSOLU", avatar: "fas fa-crown", likes: 15800 },
            { id: "c2", name: "JOYBOY", rank: "LÉGENDE VIVANTE", avatar: "fas fa-dragon", likes: 14200 },
            { id: "c3", name: "AKUMA NO RYU", rank: "CHEF DE GUERRE", avatar: "fas fa-skull", likes: 12900 }
        ],
        souschefs: [
            { id: "sc1", name: "MISS ROUGE", rank: "GARDE ROYALE", avatar: "fas fa-fist-raised", likes: 8700 },
            { id: "sc2", name: "KURO TENSHI", rank: "STRATÈGE SUPRÊME", avatar: "fas fa-chess-queen", likes: 9100 },
            { id: "sc3", name: "SCARLET VIPER", rank: "EXÉCUTRICE", avatar: "fas fa-snake", likes: 8300 }
        ],
        soldats: [
            { id: "s1", name: "REN SHIROGANE", rank: "LANCE D'ÉLITE", avatar: "fas fa-shield-virus", likes: 4200 },
            { id: "s2", name: "KAI BLOODMOON", rank: "SABREUR INFERNAL", avatar: "fas fa-meteor", likes: 3900 },
            { id: "s3", name: "RIN OKAMI", rank: "GUERRIER MYSTIQUE", avatar: "fas fa-wolf-pack-battalion", likes: 3700 },
            { id: "s4", name: "HIKARI NO AKUMA", rank: "VANNEUR DES ÂMES", avatar: "fas fa-fire", likes: 3500 },
            { id: "s5", name: "ZAN KURENAI", rank: "LAME ÉCARLATE", avatar: "fas fa-khanda", likes: 4000 }
        ]
    };

    let currentEditType = null;
    let currentEditId = null;

    // Helper: générer ID simple
    function genId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 6); }

    // Sauvegarder dans localStorage
    function saveToLocal() {
        localStorage.setItem('zetsu_admin_data', JSON.stringify(membersData));
    }

    function loadFromLocal() {
        const saved = localStorage.getItem('zetsu_admin_data');
        if(saved) {
            try {
                const parsed = JSON.parse(saved);
                if(parsed.chefs && parsed.souschefs && parsed.soldats) membersData = parsed;
            } catch(e) {}
        }
    }

    // Rendu des listes admin (cartes rouges magnifiques)
    function renderAdminLists() {
        const chefsContainer = document.getElementById('chefsList');
        const sousContainer = document.getElementById('sousChefsList');
        const soldatsContainer = document.getElementById('soldatsList');
        
        chefsContainer.innerHTML = '';
        membersData.chefs.forEach(chef => {
            chefsContainer.appendChild(createAdminCard(chef, 'chef'));
        });
        membersData.souschefs.forEach(sc => {
            sousContainer.appendChild(createAdminCard(sc, 'souschef'));
        });
        membersData.soldats.forEach(sold => {
            soldatsContainer.appendChild(createAdminCard(sold, 'soldat'));
        });
    }

    function createAdminCard(member, type) {
        const card = document.createElement('div');
        card.className = 'member-admin-card';
        card.onclick = () => openEditModal(member, type);
        let avatarHtml = '';
        if(member.avatar && (member.avatar.startsWith('fas ') || member.avatar.startsWith('far ') || member.avatar.startsWith('fab '))) {
            avatarHtml = `<i class="${member.avatar}" style="font-size: 2.5rem;"></i>`;
        } else if(member.avatar && member.avatar.startsWith('http')) {
            avatarHtml = `<img src="${member.avatar}" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">`;
        } else {
            avatarHtml = `<i class="fas fa-user-ninja"></i>`;
        }
        card.innerHTML = `
            <div class="admin-card-content">
                <div class="admin-avatar">${avatarHtml}</div>
                <div class="admin-info">
                    <h3>${escapeHtml(member.name)}</h3>
                    <p><i class="fas fa-tag"></i> ${escapeHtml(member.rank)}</p>
                    <small style="color:#ffaa88;"><i class="fas fa-heart" style="color:#ff5555;"></i> ${member.likes || 0} likes</small>
                </div>
                <div class="edit-badge"><i class="fas fa-pen-square"></i></div>
            </div>
        `;
        return card;
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // OUVERTURE MODAL
    let currentModalMember = null;
    let currentModalType = null;
    function openEditModal(member, type) {
        currentModalMember = { ...member };
        currentModalType = type;
        currentEditId = member.id;
        document.getElementById('editName').value = member.name;
        const previewDiv = document.getElementById('editImagePreview');
        if(member.avatar && (member.avatar.startsWith('fas ') || member.avatar.startsWith('far '))) {
            previewDiv.style.backgroundImage = 'none';
            previewDiv.innerHTML = `<i class="${member.avatar}" style="font-size: 3rem; color:#ff7777;"></i>`;
        } else if(member.avatar && member.avatar.startsWith('http')) {
            previewDiv.style.backgroundImage = `url(${member.avatar})`;
            previewDiv.innerHTML = '';
        } else {
            previewDiv.style.backgroundImage = 'none';
            previewDiv.innerHTML = `<i class="fas fa-user-circle" style="font-size: 3rem;"></i>`;
        }
        document.getElementById('editAvatar').value = member.avatar || 'fas fa-user';
        document.getElementById('editModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('editModal').style.display = 'none';
    }

    function saveEdit() {
        const newName = document.getElementById('editName').value.trim();
        if(!newName) return;
        const newAvatar = document.getElementById('editAvatar').value;
        let targetArray = null;
        if(currentModalType === 'chef') targetArray = membersData.chefs;
        else if(currentModalType === 'souschef') targetArray = membersData.souschefs;
        else if(currentModalType === 'soldat') targetArray = membersData.soldats;
        const index = targetArray.findIndex(m => m.id === currentEditId);
        if(index !== -1) {
            targetArray[index].name = newName;
            if(newAvatar) targetArray[index].avatar = newAvatar;
        }
        saveToLocal();
        renderAdminLists();
        closeModal();
        showNotification('Membre modifié avec succès !');
    }

    function deleteMember() {
        if(confirm('Supprimer définitivement ce guerrier du clan ?')) {
            let targetArray = null;
            if(currentModalType === 'chef') targetArray = membersData.chefs;
            else if(currentModalType === 'souschef') targetArray = membersData.souschefs;
            else targetArray = membersData.soldats;
            const idx = targetArray.findIndex(m => m.id === currentEditId);
            if(idx !== -1) targetArray.splice(idx, 1);
            saveToLocal();
            renderAdminLists();
            closeModal();
            showNotification('Membre banni des légendes ❌');
        }
    }

    // Ajout membre avec upload image (convertit en dataURL)
    let uploadedImageData = null;
    function setupUpload() {
        const uploadDiv = document.getElementById('uploadArea');
        const fileInput = document.getElementById('photoUpload');
        uploadDiv.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    uploadedImageData = ev.target.result;
                    const preview = document.getElementById('imagePreview');
                    preview.style.backgroundImage = `url(${uploadedImageData})`;
                    preview.style.backgroundSize = 'cover';
                    preview.innerHTML = '';
                    document.getElementById('newMemberAvatar').value = uploadedImageData;
                };
                reader.readAsDataURL(file);
            }
        });
    }

    // Setup edit upload
    function setupEditUpload() {
        const editArea = document.getElementById('editUploadArea');
        const editFile = document.getElementById('editPhotoUpload');
        editArea.addEventListener('click', () => editFile.click());
        editFile.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    const imgData = ev.target.result;
                    document.getElementById('editAvatar').value = imgData;
                    const preview = document.getElementById('editImagePreview');
                    preview.style.backgroundImage = `url(${imgData})`;
                    preview.style.backgroundSize = 'cover';
                    preview.innerHTML = '';
                };
                reader.readAsDataURL(file);
            }
        });
    }

    function addMember() {
        const name = document.getElementById('newMemberName').value.trim();
        const rankType = document.getElementById('newMemberRank').value;
        let avatarValue = document.getElementById('newMemberAvatar').value;
        if(!name) { alert("Nom requis !"); return; }
        if(!avatarValue) avatarValue = "fas fa-user-secret";
        const newMember = {
            id: genId(),
            name: name,
            rank: rankType === 'chef' ? "Chef Suprême" : (rankType === 'souschef' ? "Sous-Chef" : "Soldat d'Élite"),
            avatar: avatarValue,
            likes: Math.floor(Math.random() * 3000) + 1000
        };
        if(rankType === 'chef') membersData.chefs.push(newMember);
        else if(rankType === 'souschef') membersData.souschefs.push(newMember);
        else membersData.soldats.push(newMember);
        saveToLocal();
        renderAdminLists();
        document.getElementById('newMemberName').value = '';
        document.getElementById('newMemberAvatar').value = '';
        document.getElementById('imagePreview').style.backgroundImage = '';
        document.getElementById('imagePreview').innerHTML = '';
        uploadedImageData = null;
        showNotification(`${name} rejoint le Clan ZETSU ! 🔥`);
        showTab(rankType === 'chef' ? 'chefs' : (rankType === 'souschef' ? 'souschefs' : 'soldats'));
    }

    function showNotification(msg) {
        const notif = document.createElement('div');
        notif.innerText = msg;
        notif.style.position = 'fixed';
        notif.style.bottom = '20px';
        notif.style.left = '20px';
        notif.style.backgroundColor = '#a11';
        notif.style.color = '#ffddbb';
        notif.style.padding = '12px 24px';
        notif.style.borderRadius = '40px';
        notif.style.zIndex = '9999';
        notif.style.border = '1px solid #ffaa77';
        notif.style.fontWeight = 'bold';
        notif.style.boxShadow = '0 0 20px red';
        document.body.appendChild(notif);
        setTimeout(() => notif.remove(), 2200);
    }

    // Tab switching
    function showTab(tabName) {
        document.getElementById('chefsTab').classList.remove('active');
        document.getElementById('souschefsTab').classList.remove('active');
        document.getElementById('soldatsTab').classList.remove('active');
        document.getElementById('addTab').classList.remove('active');
        if(tabName === 'chefs') document.getElementById('chefsTab').classList.add('active');
        else if(tabName === 'souschefs') document.getElementById('souschefsTab').classList.add('active');
        else if(tabName === 'soldats') document.getElementById('soldatsTab').classList.add('active');
        else document.getElementById('addTab').classList.add('active');
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        if(tabName === 'chefs') document.querySelectorAll('.tab-btn')[0].classList.add('active');
        else if(tabName === 'souschefs') document.querySelectorAll('.tab-btn')[1].classList.add('active');
        else if(tabName === 'soldats') document.querySelectorAll('.tab-btn')[2].classList.add('active');
        else document.querySelectorAll('.tab-btn')[3].classList.add('active');
    }

    // Auth
    function checkPassword() {
        const pwd = document.getElementById('adminPassword').value;
        if(pwd === 'zetsuadmin') {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadFromLocal();
            renderAdminLists();
        } else {
            document.getElementById('errorMsg').innerText = 'Code d\'accès invalide';
        }
    }
    function logout() {
        document.getElementById('loginContainer').style.display = 'flex';
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('adminPassword').value = '';
    }

    window.checkPassword = checkPassword;
    window.logout = logout;
    window.showTab = showTab;
    window.addMember = addMember;
    window.saveEdit = saveEdit;
    window.deleteMember = deleteMember;
    window.closeModal = closeModal;

    // initialisations
    setupUpload();
    setupEditUpload();
    loadFromLocal();
    // option pour que le style soit rougeoyant
    const styleRed = document.createElement('style');
    styleRed.textContent = `.admin-btn, .tab-btn.active { background: linear-gradient(95deg, #b11, #5a0101); } .member-admin-card:hover .admin-avatar { box-shadow: 0 0 18px #ff5555; }`;
    document.head.appendChild(styleRed);
</script>
</body>
</html>
